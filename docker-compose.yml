services:
  app:
    build: .
    container_name: lpr-access-platform
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-5000}:5000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./exports:/app/exports
      - ./logs:/app/logs
    shm_size: "1gb"
