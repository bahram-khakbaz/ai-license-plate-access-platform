services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lpr-access-platform
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-5000}:5000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./exports:/app/exports
      - ./logs:/app/logs
    shm_size: "1gb"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
